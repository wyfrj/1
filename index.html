<!DOCTYPE html>
<html>
<head>

<body>

<div id="mse" style="width: 800px; height: 450px; margin: 0 auto;"></div>
<script type="text/javascript">

    var alternateUrl = 'https://upos-sz-mirrorcos.bilivideo.com/upgcxcode/76/93/32930269376/32930269376-1-192.mp4?e=ig8euxZM2rNcNbRVhwdVhwdlhWdVhwdVhoNvNC8BqJIzNbfq9rVEuxTEnE8L5F6VnEsSTx0vkX8fqJeYTj_lta53NCM=&og=ali&platform=html5&trid=54ef3427b9514d919e1cf32590c5461h&nbs=1&uipk=5&mid=0&gen=playurlv3&oi=795799114&deadline=1777508613&os=estgoss&upsig=f7eb97ec62a7d1c0ef6ea4daac0b6f19&uparams=e,og,platform,trid,nbs,uipk,mid,gen,oi,deadline,os&bvc=vod&nettype=0&bw=318660&buvid=&build=0&dl=0&f=h_0_0&agrr=1&orderid=0,1';
    var currentUrl = originalUrl;
    var info = {
        playerElm: 'mse',
        url: currentUrl,
        infoButton: true,
        optionButton: true,
        snapshotButton: true,
        controlbar: true,
        autoplay: true,
    };

    function createPlayer(url) {
        var container = document.getElementById('mse');
        container.innerHTML = '';
        info.url = url;
        new ZWPlayer(info);
    }

    document.getElementById('switchVideoBtn').addEventListener('click', function () {
        currentUrl = currentUrl === originalUrl ? alternateUrl : originalUrl;
        this.textContent = currentUrl === alternateUrl ? '切换回原视频' : '切换视频';
        createPlayer(currentUrl);
    });

    createPlayer(currentUrl);
</script>
</body>
